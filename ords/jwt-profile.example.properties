# Example pool-level ORDS JWT trust settings for Auth0-issued access tokens.
# Use these settings only when your ORDS deployment is configured for
# pool-level JWT profiles. For schema-level JWT trust, use
# ORDS_SECURITY.CREATE_JWT_PROFILE or ORDS_SECURITY_ADMIN.CREATE_JWT_PROFILE.

security.jwt.profile.mode=POOL

# The token issuer. This typically includes a trailing slash.
security.jwt.profile.issuer=https://your-tenant.auth0.com/

# The expected aud claim. This is the Auth0 API Identifier.
# It is a logical identifier, not the ORDS endpoint URL.
security.jwt.profile.audience=https://api.example.com/ords-api

# The JWKS document used to validate Auth0 RS256 signatures.
security.jwt.profile.jwk.url=https://your-tenant.auth0.com/.well-known/jwks.json
